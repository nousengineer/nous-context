<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" fill="none">
  <!-- Background circle -->
  <circle cx="100" cy="105" r="100" fill="#1E1E2E"/>

  <!--
    Icon paths scaled up (original viewBox 0 0 24 24 → scale ~6.5, translate to center)
    Original icon:
      path d="M17 8h1a4 4 0 1 1 0 8h-1"  (handle)
      path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"  (cup body)
      line x1="6" y1="2" x2="6" y2="4"  (steam 1)
      line x1="10" y1="2" x2="10" y2="4" (steam 2)
      line x1="14" y1="2" x2="14" y2="4" (steam 3)
    Scale: 6.5x, translate: tx=19, ty=35
  -->
  <g transform="translate(19,35) scale(6.5)">
    <!-- Steam lines -->
    <line x1="6"  y1="2" x2="6"  y2="4" stroke="#C8A96E" stroke-width="2" stroke-linecap="round"/>
    <line x1="10" y1="2" x2="10" y2="4" stroke="#C8A96E" stroke-width="2" stroke-linecap="round"/>
    <line x1="14" y1="2" x2="14" y2="4" stroke="#C8A96E" stroke-width="2" stroke-linecap="round"/>
    <!-- Cup body -->
    <path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z" fill="#2D2D44" stroke="#C8A96E" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Handle -->
    <path d="M17 8h1a4 4 0 1 1 0 8h-1" fill="none" stroke="#C8A96E" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Coffee surface -->
    <ellipse cx="10" cy="9.5" rx="5.5" ry="1.3" fill="#6F4E37" opacity="0.85"/>
    <!-- Latte art swirl -->
    <path d="M5.5 9.5 Q7.5 7.8 10 9.5 Q12.5 11.2 14.5 9.5" stroke="#D4A96A" stroke-width="0.35" stroke-linecap="round" fill="none" opacity="0.9"/>
  </g>

  <!-- Text: thinkBrew -->
  <text x="100" y="198" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="700" fill="#C8A96E" text-anchor="middle" letter-spacing="1.5">thinkBrew</text>
</svg>
