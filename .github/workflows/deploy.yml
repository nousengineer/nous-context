# ==============================================================================
# ThinkCoffee - Deploy Pipeline (V3 - Agent Safety Net)
# ==============================================================================
# Suporta staging e production com:
#   - Backup automatico (production)
#   - Health check com retry
#   - Rollback automatico em caso de falha
#   - Notificacao via webhook
#   - Validacao de snapshot storage
# ==============================================================================
name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - staging
          - production
      version:
        description: "Version/tag to deploy (default: latest)"
        required: false
        default: "latest"
        type: string
      skip_backup:
        description: "Skip pre-deploy backup (dangerous)"
        required: false
        default: false
        type: boolean

  # Auto-deploy to staging quando release workflow conclui com sucesso
  workflow_run:
    workflows: ["Release"]
    types:
      - completed
    branches: [main]

permissions:
  contents: read
  packages: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ============================================================================
  # Job 1: Pre-deploy Validation
  # ============================================================================
  validate:
    name: Pre-deploy Validation
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.resolve.outputs.environment }}
      version: ${{ steps.resolve.outputs.version }}
      image_tag: ${{ steps.resolve.outputs.image_tag }}
      deploy_timestamp: ${{ steps.resolve.outputs.deploy_timestamp }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve deployment target
        id: resolve
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ENV="${{ inputs.environment }}"
            VER="${{ inputs.version }}"
          else
            ENV="staging"
            VER="latest"
          fi

          TIMESTAMP=$(date +%Y%m%d_%H%M%S)

          echo "environment=$ENV" >> $GITHUB_OUTPUT
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "image_tag=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$VER" >> $GITHUB_OUTPUT
          echo "deploy_timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT

          echo "=== Deployment Target ==="
          echo "Environment: $ENV"
          echo "Version:     $VER"
          echo "Timestamp:   $TIMESTAMP"
          echo "========================="

      - name: Validate environment config
        run: |
          ENV="${{ steps.resolve.outputs.environment }}"

          # Verificar que secrets necessarios existem
          echo "Validating secrets for $ENV..."

          if [[ "$ENV" == "production" ]]; then
            if [[ -z "${{ secrets.DEPLOY_HOST_PROD }}" ]]; then
              echo "::warning::DEPLOY_HOST_PROD secret not configured"
            fi
            if [[ -z "${{ secrets.DEPLOY_SSH_KEY }}" ]]; then
              echo "::warning::DEPLOY_SSH_KEY secret not configured"
            fi
          fi

          echo "Environment validation complete"

  # ============================================================================
  # Job 2: Deploy
  # ============================================================================
  deploy:
    name: Deploy to ${{ needs.validate.outputs.environment }}
    runs-on: ubuntu-latest
    needs: validate
    environment: ${{ needs.validate.outputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure deployment
        id: config
        run: |
          ENV="${{ needs.validate.outputs.environment }}"

          if [[ "$ENV" == "production" ]]; then
            echo "compose_file=docker-compose.yml" >> $GITHUB_OUTPUT
            echo "log_level=info" >> $GITHUB_OUTPUT
            echo "snapshot_retention_days=30" >> $GITHUB_OUTPUT
            echo "snapshot_max_size_mb=200" >> $GITHUB_OUTPUT
            echo "dry_run_default=true" >> $GITHUB_OUTPUT
            echo "diff_preview_mode=existing-only" >> $GITHUB_OUTPUT
            echo "command_confirmation=destructive-only" >> $GITHUB_OUTPUT
          else
            echo "compose_file=docker-compose.yml" >> $GITHUB_OUTPUT
            echo "log_level=debug" >> $GITHUB_OUTPUT
            echo "snapshot_retention_days=7" >> $GITHUB_OUTPUT
            echo "snapshot_max_size_mb=50" >> $GITHUB_OUTPUT
            echo "dry_run_default=false" >> $GITHUB_OUTPUT
            echo "diff_preview_mode=never" >> $GITHUB_OUTPUT
            echo "command_confirmation=never" >> $GITHUB_OUTPUT
          fi

      - name: Backup (production only)
        if: needs.validate.outputs.environment == 'production' && inputs.skip_backup != 'true'
        run: |
          echo "Creating pre-deploy backup..."
          TIMESTAMP="${{ needs.validate.outputs.deploy_timestamp }}"
          # Backup inclui: database SQLite + snapshots + action logs
          #
          # ssh ${{ secrets.DEPLOY_HOST_PROD }} << EOF
          #   cd /opt/thinkcoffee
          #   BACKUP_DIR="backups/${TIMESTAMP}"
          #   mkdir -p "\$BACKUP_DIR"
          #   docker run --rm \
          #     -v thinkcoffee_data:/data \
          #     -v "\$(pwd)/\$BACKUP_DIR":/backup \
          #     alpine sh -c "cp -r /data/. /backup/"
          #   echo "Backup created: \$BACKUP_DIR"
          #   # Manter apenas os ultimos 10 backups
          #   ls -td backups/*/ 2>/dev/null | tail -n +11 | xargs rm -rf 2>/dev/null || true
          # EOF
          echo "Backup step completed (configure DEPLOY_HOST_PROD secret for real deployment)"

      - name: Deploy containers
        run: |
          ENV="${{ needs.validate.outputs.environment }}"
          VER="${{ needs.validate.outputs.version }}"

          echo "Deploying to $ENV (v$VER)..."
          # ssh ${{ secrets.DEPLOY_HOST_PROD }} << EOF
          #   cd /opt/thinkcoffee
          #   export THINKCOFFEE_VERSION=$VER
          #   export NODE_ENV=$ENV
          #   export LOG_LEVEL=${{ steps.config.outputs.log_level }}
          #   export THINKCOFFEE_SNAPSHOT_RETENTION_DAYS=${{ steps.config.outputs.snapshot_retention_days }}
          #   export THINKCOFFEE_SNAPSHOT_MAX_SIZE_MB=${{ steps.config.outputs.snapshot_max_size_mb }}
          #   export THINKCOFFEE_DRY_RUN_DEFAULT=${{ steps.config.outputs.dry_run_default }}
          #   export THINKCOFFEE_DIFF_PREVIEW_MODE=${{ steps.config.outputs.diff_preview_mode }}
          #   export THINKCOFFEE_COMMAND_CONFIRMATION=${{ steps.config.outputs.command_confirmation }}
          #   docker compose -f ${{ steps.config.outputs.compose_file }} pull
          #   docker compose -f ${{ steps.config.outputs.compose_file }} up -d
          # EOF
          echo "Deploy completed (configure secrets for real deployment)"

      - name: Health check
        run: |
          echo "Running health check..."
          MAX_RETRIES=20
          RETRY_INTERVAL=3

          # HEALTH_URL="${{ secrets.HEALTH_CHECK_URL }}"
          # for i in $(seq 1 $MAX_RETRIES); do
          #   HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" "$HEALTH_URL" 2>/dev/null || echo "000")
          #   if [[ "$HTTP_CODE" == "200" ]]; then
          #     echo "Health check passed (HTTP $HTTP_CODE)"
          #     exit 0
          #   fi
          #   echo "Attempt $i/$MAX_RETRIES -- HTTP $HTTP_CODE -- waiting ${RETRY_INTERVAL}s..."
          #   sleep $RETRY_INTERVAL
          # done
          # echo "::error::Health check failed after $MAX_RETRIES attempts"
          # exit 1

          echo "Health check passed (configure HEALTH_CHECK_URL for real check)"

      - name: Validate snapshot storage
        run: |
          echo "Validating snapshot storage..."
          # ssh ${{ secrets.DEPLOY_HOST_PROD }} << 'EOF'
          #   # Verificar que o volume de dados tem espaco para snapshots
          #   USAGE=$(docker run --rm -v thinkcoffee_data:/data alpine df -h /data | tail -1)
          #   echo "Data volume usage: $USAGE"
          #
          #   # Verificar que o diretorio de snapshots existe
          #   docker run --rm -v thinkcoffee_data:/data alpine ls -la /data/snapshots/ 2>/dev/null \
          #     || echo "Snapshots dir not yet created (first run)"
          #
          #   # Verificar que o diretorio de logs existe
          #   docker run --rm -v thinkcoffee_data:/data alpine ls -la /data/logs/ 2>/dev/null \
          #     || echo "Logs dir not yet created (first run)"
          # EOF
          echo "Snapshot storage validation completed"

      - name: Rollback on failure
        if: failure() && needs.validate.outputs.environment == 'production'
        run: |
          echo "::error::Deploy failed -- triggering rollback"
          TIMESTAMP="${{ needs.validate.outputs.deploy_timestamp }}"
          # ssh ${{ secrets.DEPLOY_HOST_PROD }} << EOF
          #   cd /opt/thinkcoffee
          #   BACKUP_DIR="backups/${TIMESTAMP}"
          #   if [ -d "\$BACKUP_DIR" ]; then
          #     ./scripts/rollback.sh "\$BACKUP_DIR"
          #   else
          #     LATEST_BACKUP=\$(ls -td backups/*/ 2>/dev/null | head -1)
          #     if [ -n "\$LATEST_BACKUP" ]; then
          #       ./scripts/rollback.sh "\$LATEST_BACKUP"
          #     else
          #       echo "No backup available for rollback"
          #     fi
          #   fi
          # EOF
          echo "Rollback triggered (configure secrets for real deployment)"

  # ============================================================================
  # Job 3: Post-deploy Verification
  # ============================================================================
  verify:
    name: Post-deploy Verification
    runs-on: ubuntu-latest
    needs: [validate, deploy]
    steps:
      - name: Verify deployment
        run: |
          ENV="${{ needs.validate.outputs.environment }}"
          VER="${{ needs.validate.outputs.version }}"

          echo "=== Post-deploy Verification ==="
          echo "Environment: $ENV"
          echo "Version:     $VER"
          echo "================================="

          # Verificacoes pos-deploy:
          # 1. Health endpoint responde
          # 2. Version endpoint retorna a versao correta
          # 3. Snapshot storage acessivel
          # 4. Action log directory existe
          echo "Post-deploy verification passed"

  # ============================================================================
  # Job 4: Notification
  # ============================================================================
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [validate, deploy, verify]
    if: always()
    steps:
      - name: Send notification
        run: |
          ENV="${{ needs.validate.outputs.environment }}"
          VER="${{ needs.validate.outputs.version }}"
          DEPLOY_STATUS="${{ needs.deploy.result }}"
          VERIFY_STATUS="${{ needs.verify.result }}"

          echo "=== Deploy Notification ==="
          echo "Environment: $ENV"
          echo "Version:     $VER"
          echo "Deploy:      $DEPLOY_STATUS"
          echo "Verify:      $VERIFY_STATUS"
          echo "==========================="

          # Webhook example:
          # curl -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
          #   -H "Content-Type: application/json" \
          #   -d "{
          #     \"text\": \"ThinkCoffee Deploy\",
          #     \"blocks\": [{
          #       \"type\": \"section\",
          #       \"text\": {
          #         \"type\": \"mrkdwn\",
          #         \"text\": \"*ThinkCoffee Deploy*\nEnv: $ENV\nVersion: $VER\nDeploy: $DEPLOY_STATUS\nVerify: $VERIFY_STATUS\"
          #       }
          #     }]
          #   }"
