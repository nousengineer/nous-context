# ==============================================================================
# ThinkCoffee - CD Pipeline (Continuous Deployment)
# ==============================================================================
# Triggers:
#   - Push tag v*.*.* -> Deploy to production
#   - Push to develop -> Deploy to staging
#   - Manual dispatch -> Select environment
# ==============================================================================

name: CD

on:
  push:
    tags:
      - 'v*.*.*'
    branches:
      - develop
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ----------------------------------------------------------------------------
  # Determine Environment
  # ----------------------------------------------------------------------------
  setup:
    name: Setup Deployment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
      version: ${{ steps.set-version.outputs.version }}
    steps:
      - name: Determine environment
        id: set-env
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "environment=production" >> $GITHUB_OUTPUT
          else
            echo "environment=staging" >> $GITHUB_OUTPUT
          fi

      - name: Determine version
        id: set-version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

  # ----------------------------------------------------------------------------
  # Build and Push Docker Images
  # ----------------------------------------------------------------------------
  build-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: setup
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push MCP Server
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            THINKCOFFEE_VERSION=${{ needs.setup.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push CLI
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.cli
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-cli:${{ needs.setup.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-cli:latest
          build-args: |
            THINKCOFFEE_VERSION=${{ needs.setup.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ----------------------------------------------------------------------------
  # Deploy to Environment
  # ----------------------------------------------------------------------------
  deploy:
    name: Deploy to ${{ needs.setup.outputs.environment }}
    runs-on: ubuntu-latest
    needs: [setup, build-push]
    environment: ${{ needs.setup.outputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/thinkcoffee
            
            # Backup before deploy (production only)
            if [[ "${{ needs.setup.outputs.environment }}" == "production" ]]; then
              ./scripts/backup.sh pre-deploy
            fi
            
            # Pull latest images
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.setup.outputs.version }}
            
            # Update and restart
            export THINKCOFFEE_VERSION=${{ needs.setup.outputs.version }}
            docker compose pull
            docker compose up -d --remove-orphans
            
            # Health check
            sleep 10
            curl -f http://localhost:3000/health || exit 1
            
            # Cleanup old images
            docker image prune -f --filter "until=48h"

  # ----------------------------------------------------------------------------
  # Post-Deploy Verification
  # ----------------------------------------------------------------------------
  verify:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: [setup, deploy]
    steps:
      - name: Wait for service stabilization
        run: sleep 30

      - name: Health check
        run: |
          for i in {1..5}; do
            if curl -sf "${{ secrets.DEPLOY_URL }}/health"; then
              echo "Health check passed"
              exit 0
            fi
            sleep 10
          done
          echo "Health check failed"
          exit 1

      - name: Notify success
        if: success()
        run: |
          echo "Deployment to ${{ needs.setup.outputs.environment }} completed successfully"
          echo "Version: ${{ needs.setup.outputs.version }}"

  # ----------------------------------------------------------------------------
  # Rollback on Failure
  # ----------------------------------------------------------------------------
  rollback:
    name: Rollback
    runs-on: ubuntu-latest
    needs: [setup, deploy, verify]
    if: failure() && needs.setup.outputs.environment == 'production'
    steps:
      - name: Trigger rollback
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/thinkcoffee
            ./scripts/rollback.sh latest
