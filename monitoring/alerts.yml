# ==============================================================================
# Prometheus Alert Rules - ThinkCoffee
# ==============================================================================

groups:
  - name: thinkcoffee_critical
    rules:
      # Service down
      - alert: ThinkCoffeeServiceDown
        expr: up{job="thinkcoffee-mcp"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "ThinkCoffee MCP Server is down"
          description: "The MCP server has been unreachable for more than 1 minute."

      # High error rate
      - alert: HighErrorRate
        expr: rate(thinkcoffee_errors_total[5m]) > 0.1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High error rate detected"
          description: "Error rate is above 0.1 errors/second for 5 minutes."

      # Disk space critical
      - alert: DiskSpaceCritical
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 < 10
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Disk space critically low"
          description: "Less than 10% disk space remaining."

  - name: thinkcoffee_warning
    rules:
      # Health check failing
      - alert: HealthCheckFailing
        expr: thinkcoffee_health_check_status == 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Health check is failing"
          description: "The health check endpoint has been failing for 2 minutes."

      # High memory usage
      - alert: HighMemoryUsage
        expr: (process_resident_memory_bytes / 1024 / 1024) > 500
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage"
          description: "Memory usage is above 500MB for 10 minutes."

      # Disk space warning
      - alert: DiskSpaceWarning
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 < 20
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Disk space running low"
          description: "Less than 20% disk space remaining."

      # No recent backups
      - alert: NoRecentBackup
        expr: time() - thinkcoffee_last_backup_timestamp > 86400 * 2
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "No recent backup"
          description: "No backup has been created in the last 48 hours."

  - name: thinkcoffee_history
    rules:
      # History save failures
      - alert: HistorySaveFailure
        expr: increase(thinkcoffee_history_save_errors_total[15m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Chat history save failures detected"
          description: "There have been failures saving chat history in the last 15 minutes."

      # Volume write issues
      - alert: VolumeWriteError
        expr: thinkcoffee_volume_write_errors_total > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Volume write errors detected"
          description: "Unable to write to the data volume. Chat history may be lost."

      # Database size growing too fast
      - alert: DatabaseGrowthHigh
        expr: rate(thinkcoffee_db_size_bytes[1h]) > 1048576
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "Database growing rapidly"
          description: "Database is growing faster than 1MB/hour."
