# ==============================================================================
# Prometheus Configuration - ThinkCoffee
# ==============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'thinkcoffee'

# Alerting configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Load alert rules
rule_files:
  - /etc/prometheus/alerts.yml

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ThinkCoffee MCP Server
  - job_name: 'thinkcoffee-mcp'
    static_configs:
      - targets: ['mcp-server:3000']
    metrics_path: /metrics
    scrape_interval: 10s

  # Docker containers (via Docker daemon)
  - job_name: 'docker'
    static_configs:
      - targets: ['host.docker.internal:9323']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'docker-host'
