# ==============================================================================
# Alertmanager Configuration - ThinkCoffee
# ==============================================================================

global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'critical'
      continue: true
    - match:
        severity: warning
      receiver: 'warning'

receivers:
  - name: 'default'
    # Default receiver - configure as needed

  - name: 'critical'
    # Configure for critical alerts
    # Example: Slack webhook
    # slack_configs:
    #   - api_url: 'https://hooks.slack.com/services/YOUR/WEBHOOK/URL'
    #     channel: '#alerts-critical'
    #     title: '[CRITICAL] {{ .GroupLabels.alertname }}'
    #     text: '{{ .CommonAnnotations.description }}'

    # Example: Email
    # email_configs:
    #   - to: 'team@example.com'
    #     from: 'alertmanager@thinkcoffee.local'
    #     smarthost: 'smtp.example.com:587'
    #     auth_username: 'user'
    #     auth_password: 'password'

  - name: 'warning'
    # Configure for warning alerts

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname']
