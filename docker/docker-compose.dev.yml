# ==============================================================================
# ThinkCoffee - Docker Compose Development (V4 - Agent Safety Net)
# ==============================================================================
# Uso:
#   docker compose -f docker-compose.dev.yml up -d
#   docker compose -f docker-compose.dev.yml logs -f mcp-server
#
# Inclui:
#   - Hot reload via volume mount
#   - Node.js debugger na porta 9229
#   - Volumes dedicados para snapshots e logs (V3)
#   - LOG_LEVEL=debug por padrao
# ==============================================================================

services:
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: thinkcoffee-mcp-dev
    command: ["pnpm", "dev:mcp"]
    environment:
      NODE_ENV: development
      THINKCOFFEE_DB_PATH: /data/data.sqlite
      THINKCOFFEE_DATA_DIR: /data
      THINKCOFFEE_SNAPSHOT_DIR: /data/snapshots
      THINKCOFFEE_LOG_DIR: /data/logs
      MCP_PORT: "3000"
      LOG_LEVEL: debug
      THINKCOFFEE_DB_LOGGING: "true"
      # V3/V4 Safety Net -- modo dev (menos restritivo)
      THINKCOFFEE_SNAPSHOT_RETENTION_DAYS: "3"
      THINKCOFFEE_SNAPSHOT_MAX_SIZE_MB: "25"
      THINKCOFFEE_DRY_RUN_DEFAULT: "false"
      THINKCOFFEE_DIFF_PREVIEW_MODE: "existing-only"
      THINKCOFFEE_COMMAND_CONFIRMATION: "destructive-only"
    volumes:
      - thinkcoffee_dev_data:/data
      # Live-reload: mount source for fast iteration
      - ./packages/core/src:/app/packages/core/src:ro
      - ./packages/mcp-server/src:/app/packages/mcp-server/src:ro
      - ./packages/cli/src:/app/packages/cli/src:ro
    ports:
      - "3000:3000"
      - "9229:9229"  # Node.js debugger
    networks:
      - thinkcoffee-network

volumes:
  thinkcoffee_dev_data:
    driver: local

networks:
  thinkcoffee-network:
    driver: bridge
